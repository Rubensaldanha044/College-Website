<!doctype html>
<html>
<head>
  <style>
    table { text-align: center; }
    h2 { text-align: center; }
    body {
      background-image: url('assets/studentbg1.jpg');
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;
    }
  </style>
  <meta charset="utf-8">
  <title>Student - St Teresa College of Engineering</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="../index.html">St Teresa College of Engineering</a>
  </div>
</nav>

<div class="container py-4">
  <h2>Your Attendance</h2>
  <table class="table table-bordered table-striped" id="myAttendance">
    <thead>
      <tr><th>Date</th><th>Course</th><th>Status</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
const token = localStorage.getItem('token'); // Student token after login
const studentId = localStorage.getItem('studentId'); // Save this on login

$(document).ready(async function() {
  try {
    const today = new Date().toISOString().split("T")[0];
    const res = await fetch(`/api/attendance/date/${today}`, {
      headers: { "Authorization": `Bearer ${token}` }
    });
    const data = await res.json();
    let html = "";
    data.forEach(a => {
      const status = a.student && a.student._id === studentId ? a.status : "Absent";
      html += `<tr><td>${new Date(a.date).toLocaleDateString()}</td><td>${a.course || '-'}</td><td>${status}</td></tr>`;
    });
    $("#myAttendance tbody").html(html);
  } catch (err) {
    console.error(err);
    alert("Error fetching attendance");
  }
});
</script>
</body>
</html>
