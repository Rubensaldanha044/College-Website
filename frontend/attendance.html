<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance - St Theresa College of Engineering</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .attendance-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">St Teresa College of Engineering</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="attendance.html">Attendance</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Attendance Form -->
    <div class="attendance-container">
        <h2 class="mb-4">Mark Attendance</h2>
        <form id="attendanceForm">
            <div class="mb-3">
                <label class="form-label">Date</label>
                <input type="date" id="attendanceDate" class="form-control" required>
            </div>

            <div id="studentList" class="mb-3">
                <!-- Student list will be loaded here via JS -->
            </div>

            <button type="submit" class="btn btn-primary">Submit Attendance</button>
        </form>
        <div id="message" class="mt-3"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        const students = [
            { id: 1, name: "John Doe" },
            { id: 2, name: "Jane Smith" },
            { id: 3, name: "Michael Johnson" },
            { id: 4, name: "Emily Davis" }
        ];

        // Load students dynamically
        $(document).ready(function() {
            let studentHTML = "";
            students.forEach(student => {
                studentHTML += `
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="${student.id}" id="student${student.id}">
                        <label class="form-check-label" for="student${student.id}">
                            ${student.name}
                        </label>
                    </div>
                `;
            });
            $("#studentList").html(studentHTML);
        });

    

        // Handle form submission
        $("#attendanceForm").on("submit", function(e) {
            e.preventDefault();

            const date = $("#attendanceDate").val();
            const presentStudents = [];
            $("input[type=checkbox]:checked").each(function() {
                presentStudents.push($(this).val());
            });

            $.ajax({
                url: "/api/attendance",
                method: "POST",
                contentType: "application/json",
                data: JSON.stringify({ date, presentStudents }),
                success: function(response) {
                    $("#message").html(`<div class="alert alert-success">Attendance saved successfully!</div>`);
                },
                error: function() {
                    $("#message").html(`<div class="alert alert-danger">Error saving attendance.</div>`);
                }
            });
        });
    </script>
    <script>
document.getElementById('attendanceForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const studentId = document.getElementById('student').value;
    const status = document.querySelector('input[name="status"]:checked').value;

    const res = await fetch('/api/attendance', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ studentId, status })
    });

    const data = await res.json();
    alert(data.message || 'Attendance saved!');
});
</script>
<script>
function saveAttendance() {
    const date = document.getElementById("attendance-date").value;
    const checkboxes = document.querySelectorAll("input[name='student']:checked");
    const students = Array.from(checkboxes).map(cb => cb.value);

    fetch("http://localhost:5000/save_attendance", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ date, students })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            alert("Attendance saved successfully!");
        } else {
            alert("Error: " + (data.error || "Unknown error"));
        }
    })
    .catch(err => {
        console.error("Fetch error:", err);
        alert("Error saving attendance");
    });
}
</script>


</body>
</html>
