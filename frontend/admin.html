<!doctype html>
<html>
<head>
  <style>
    h2{
        text-align:center;
      }
      h4{
        text-align:center;
      }
      table{
        text-align:center;
      }
    body {
  background-image: url('assets/studentbg1.jpg');
  background-repeat: no-repeat;
  background-attachment: fixed;
  background-size: cover;
}
  </style>
  <meta charset="utf-8">
  <title>Admin - St Teresa College of Engineering</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<nav class="navbar navbar-dark bg-primary"><div class="container"><a class="navbar-brand" href="../index.html">St Teresa College of Engineering</a></div></nav>
<div class="container py-4">
  <h2>Admin Dashboard</h2>
  <br>
  <div class="row">
    <div class="col-md-6">
      <h4>Students</h4>
      <table class="table table-striped" id="studentsTable"><thead><tr><th>Name</th><th>Email</th><th>Course</th><th>Actions</th></tr></thead><tbody></tbody></table>
      <button class="btn btn-success mb-2" id="addStudentBtn">Add Student</button>
    </div>
    <div class="col-md-6">
      <h4>Courses</h4>
      <table class="table table-striped" id="coursesTable"><thead><tr><th>Code</th><th>Title</th><th>Credits</th><th>Actions</th></tr></thead><tbody></tbody></table>
      <button class="btn btn-success mb-2" id="addCourseBtn">Add Course</button>
    </div>
  </div>
</div>

<!-- Modals -->
<div class="modal" tabindex="-1" id="studentModal"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Add Student</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body">
<form id="studentForm"><input id="s_name" class="form-control mb-2" placeholder="Name" required><input id="s_email" class="form-control mb-2" placeholder="Email" required><input id="s_studentId" class="form-control mb-2" placeholder="Student ID"><input id="s_course" class="form-control mb-2" placeholder="Course"><button class="btn btn-primary">Save</button></form>
</div></div></div></div>

<div class="modal" tabindex="-1" id="courseModal"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Add Course</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body">
<form id="courseForm"><input id="c_code" class="form-control mb-2" placeholder="Code" required><input id="c_title" class="form-control mb-2" placeholder="Title" required><input id="c_credits" class="form-control mb-2" placeholder="Credits"><button class="btn btn-primary">Save</button></form>
</div></div></div></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="assets/js/admin.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
